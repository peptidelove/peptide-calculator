<svg width="180" height="180" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#0e1f33"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <!-- Cap gradient (purple metallic) -->
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d4ac4"/>
      <stop offset="45%" stop-color="#a98ce8"/>
      <stop offset="100%" stop-color="#5a3aa8"/>
    </linearGradient>
    <!-- Liquid gradient (blue to teal) -->
    <linearGradient id="liquid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b4fd6"/>
      <stop offset="55%" stop-color="#2f7de0"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glass tint -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#2b4d77" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#15314f" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Outer glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)" stroke="#1d3550" stroke-width="0.75"/>

  <!-- Glowing vial group -->
  <g filter="url(#glow)">
    <!-- Vial body (glass) -->
    <path d="M24 22
             h16
             v3
             a3 3 0 0 1 3 3
             v18
             a4 4 0 0 1 -4 4
             h-14
             a4 4 0 0 1 -4 -4
             v-18
             a3 3 0 0 1 3 -3
             z"
          fill="url(#glass)" stroke="#3ad7ff" stroke-width="1.1"/>

    <!-- Liquid fill (lower portion, with rounded bottom matching body) -->
    <path d="M22 37
             v9
             a4 4 0 0 0 4 4
             h12
             a4 4 0 0 0 4 -4
             v-9
             z"
          fill="url(#liquid)"/>
    <!-- Liquid surface line -->
    <line x1="22" y1="37" x2="42" y2="37" stroke="#a6f0ff" stroke-width="0.9" opacity="0.85"/>

    <!-- Neck -->
    <rect x="26" y="18" width="12" height="5" rx="1" fill="#101826" stroke="#3ad7ff" stroke-width="0.6"/>

    <!-- Cap -->
    <rect x="24" y="12" width="16" height="7" rx="2.5" fill="url(#cap)" stroke="#c4b0f0" stroke-width="0.6"/>
    <ellipse cx="32" cy="12.5" rx="8" ry="1.8" fill="#bda6ee" opacity="0.7"/>
  </g>

  <!-- Molecule node graph -->
  <g stroke="#dff4ff" stroke-width="1.1" fill="#eafaff" opacity="0.95">
    <!-- bonds -->
    <line x1="26" y1="44" x2="26" y2="38"/>
    <line x1="26" y1="38" x2="32" y2="34"/>
    <line x1="32" y1="34" x2="38" y2="38"/>
    <line x1="38" y1="38" x2="38" y2="44"/>
    <line x1="29" y1="41.5" x2="32" y2="40"/>
    <line x1="32" y1="40" x2="35" y2="41.5"/>
    <!-- nodes -->
    <circle cx="26" cy="44" r="1.7"/>
    <circle cx="26" cy="38" r="1.7"/>
    <circle cx="32" cy="34" r="1.7"/>
    <circle cx="38" cy="38" r="1.7"/>
    <circle cx="38" cy="44" r="1.7"/>
    <circle cx="29" cy="41.5" r="1.5" fill="none"/>
    <circle cx="32" cy="40" r="1.5" fill="none"/>
    <circle cx="35" cy="41.5" r="1.5" fill="none"/>
  </g>
</svg>
